name: Ruby

on:
  push:
    branches:
      - main

  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Ruby ${{ matrix.ruby }}
    continue-on-error: ${{ matrix.ruby == '4.0' }}
    strategy:
      fail-fast: false
      matrix:
        ruby:
          - '3.2'
          - '3.3'
          - '3.4'
          - '4.0'

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Run the default task
        run: bundle exec rake

  typecheck:
    runs-on: ubuntu-latest
    name: Steep type check
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
      - name: Run Steep
        run: bundle exec steep check

  docs:
    runs-on: ubuntu-latest
    name: Docs generate cleanly
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
      - name: Generate YARD docs
        run: bundle exec yard doc --no-output --fail-on-warning
      - name: Check documentation coverage
        run: bundle exec rake docs:coverage

  schemas:
    runs-on: ubuntu-latest
    name: Schemas up to date
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
      - name: Regenerate schemas
        run: bundle exec rake pull_fields
      - name: Check for schema changes
        run: |
          if ! git diff --exit-code -- data/schemas; then
            echo "::error::Os schemas em data/schemas estão desatualizados. Rode 'bundle exec rake pull_fields' e faça commit das alterações."
            exit 1
          fi
