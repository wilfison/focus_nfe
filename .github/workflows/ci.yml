name: CI

on:
  push:
    branches:
      - main

  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Ruby ${{ matrix.ruby }}
    continue-on-error: ${{ matrix.ruby == '4.0' || matrix.ruby == 'ruby' }}
    strategy:
      fail-fast: false
      matrix:
        ruby:
          - '3.3'
          - '3.4'
          - '4.0'
          - 'ruby'

    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Run the default task
        run: bundle exec rake

  typecheck:
    runs-on: ubuntu-latest
    name: Steep type check
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
      - name: Run Steep
        run: bundle exec steep check

  docs:
    runs-on: ubuntu-latest
    name: Docs generate cleanly
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
      - name: Generate YARD docs
        run: bundle exec yard doc --no-output --fail-on-warning
      - name: Check documentation coverage
        run: bundle exec rake docs:coverage
