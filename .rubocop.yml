plugins:
  - rubocop-performance
  - rubocop-rspec

AllCops:
  TargetRubyVersion: 3.2
  NewCops: enable
  SuggestExtensions: false

# Dependências de desenvolvimento ficam no gemspec (layout padrão do bundler para gems).
Gemspec/DevelopmentDependencies:
  EnforcedStyle: gemspec

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/StringLiteralsInInterpolation:
  EnforcedStyle: double_quotes

# Argumentos nomeados são autodescritivos e imunes ao problema de ordem dos
# posicionais. Configuracao/Cliente recebem legitimamente vários kwargs.
Metrics/ParameterLists:
  CountKeywordArgs: false

# O spec de validação na emissão exercita um recurso de cada tipo emitível
# (nfe, nfce, cte, cte_os, mdfe) além do client — cada um é um let legítimo.
RSpec/MultipleMemoizedHelpers:
  Max: 7

# Literais de hash/array/heredoc descrevem um único dado (payload, definição de
# campo, schema) e não devem inflar a contagem de linhas do exemplo.
RSpec/ExampleLength:
  CountAsOne:
    - array
    - hash
    - heredoc

# Descrições de context/shared_context em português (projeto é pt-BR).
RSpec/ContextWording:
  Enabled: true
  Prefixes:
    - "quando"
    - "com"
    - "sem"
    - "enquanto"
    - "dado"
    - "considerando"
    - "retorna"
