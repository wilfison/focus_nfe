# Configuração do overcommit (https://github.com/sds/overcommit).
# Instale os hooks com `bundle exec overcommit --install`.

gemfile: false

CommitMsg:
  ALL:
    requires_files: false

  # Exige que toda mensagem de commit siga o padrão Conventional Commits
  # (https://www.conventionalcommits.org): <tipo>(escopo opcional)!: <descrição>
  MessageFormat:
    enabled: true
    pattern: '\A(?:Merge|Revert|fixup!|squash!).*|\A(build|chore|ci|docs|feat|fix|perf|refactor|revert|style|test)(\([\w\-./ ]+\))?!?: .+'
    expected_pattern_message: >-
      A mensagem de commit deve seguir o padrão Conventional Commits:
      <tipo>(escopo opcional): <descrição>. Tipos válidos: build, chore, ci,
      docs, feat, fix, perf, refactor, revert, style, test.
    sample_message: "feat(nfe): adiciona emissão de NFe"

  CapitalizedSubject:
    enabled: false

  TextWidth:
    enabled: true
    min_subject_width: 8
    max_subject_width: 72

  TrailingPeriod:
    enabled: true

  SingleLineSubject:
    enabled: true

  EmptyMessage:
    enabled: true

PreCommit:
  RuboCop:
    enabled: true
    command: ["bundle", "exec", "rubocop"]
    on_warn: fail

  TrailingWhitespace:
    enabled: true
    exclude:
      - "data/schemas/**/*"

  HardTabs:
    enabled: true

  MergeConflicts:
    enabled: true

  YamlSyntax:
    enabled: true

PrePush:
  RSpec:
    enabled: true
    command: ["bundle", "exec", "rspec"]
